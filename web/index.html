<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>GPT from Scratch — Chat</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: sans-serif; background: #f4f4f4; display: flex;
         justify-content: center; padding: 2rem; }
  .container { width: 100%; max-width: 640px; }
  h1 { font-size: 1.3rem; margin-bottom: 1rem; color: #333; }
  #chat-box { background: #fff; border: 1px solid #ddd; border-radius: 8px;
              height: 400px; overflow-y: auto; padding: 1rem;
              margin-bottom: 1rem; font-size: 0.95rem; }
  .msg { margin-bottom: 0.75rem; }
  .msg.user span { background: #4f46e5; color: #fff; padding: 6px 12px;
                   border-radius: 16px; display: inline-block; }
  .msg.bot span  { background: #e5e7eb; color: #111; padding: 6px 12px;
                   border-radius: 16px; display: inline-block; }
  .controls { display: flex; gap: 8px; }
  input[type="text"] { flex: 1; padding: 10px 14px; border: 1px solid #ccc;
                       border-radius: 8px; font-size: 1rem; }
  button { padding: 10px 18px; background: #4f46e5; color: #fff;
           border: none; border-radius: 8px; cursor: pointer; font-size: 1rem; }
  button:hover { background: #4338ca; }
  .settings { margin-top: 0.75rem; font-size: 0.85rem; color: #666;
              display: flex; gap: 16px; flex-wrap: wrap; align-items: center; }
  .settings label { display: flex; gap: 6px; align-items: center; }
  .settings select, .settings input[type="range"] { font-size: 0.85rem; }
</style>
</head>
<body>
<div class="container">
  <h1>🧠 GPT from Scratch</h1>
  <div id="chat-box"></div>
  <div class="controls">
    <input type="text" id="prompt" placeholder="Type a prompt…" onkeydown="if(event.key==='Enter') send()">
    <button onclick="send()">Send</button>
  </div>
  <div class="settings">
    <label>Strategy:
      <select id="strategy">
        <option value="top_k">top_k</option>
        <option value="sample">sample</option>
        <option value="greedy">greedy</option>
      </select>
    </label>
    <label>Temp: <input type="range" id="temp" min="0.1" max="2" step="0.1" value="0.8">
      <span id="temp-val">0.8</span>
    </label>
    <label>Max tokens: <input type="range" id="maxnew" min="20" max="200" step="10" value="80">
      <span id="maxnew-val">80</span>
    </label>
  </div>
</div>
<script>
document.getElementById("temp").oninput = e =>
  document.getElementById("temp-val").textContent = e.target.value;
document.getElementById("maxnew").oninput = e =>
  document.getElementById("maxnew-val").textContent = e.target.value;

function addMsg(text, role) {
  const box = document.getElementById("chat-box");
  const div = document.createElement("div");
  div.className = "msg " + role;
  div.innerHTML = `<span>${text}</span>`;
  box.appendChild(div);
  box.scrollTop = box.scrollHeight;
}

async function send() {
  const inp = document.getElementById("prompt");
  const prompt = inp.value.trim();
  if (!prompt) return;
  inp.value = "";
  addMsg(prompt, "user");
  addMsg("…", "bot");

  const res = await fetch("http://localhost:5000/generate", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      prompt,
      strategy: document.getElementById("strategy").value,
      temperature: parseFloat(document.getElementById("temp").value),
      max_new: parseInt(document.getElementById("maxnew").value),
      k: 10,
    })
  });
  const data = await res.json();
  const msgs = document.querySelectorAll(".msg.bot");
  msgs[msgs.length - 1].querySelector("span").textContent =
    data.result || data.error || "Error";
}
</script>
</body>
</html>
